<!doctype html>
<html lang="es">
<head>
  <title>Inicio | Guía</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="./css/base/variables.css" rel="stylesheet">
  <link href="./css/layout/layout.css" rel="stylesheet">
  <link href="./css/components/card.css" rel="stylesheet">
  <link href="./css/components/carousel.css" rel="stylesheet">
  <script src="./js/partials.js" type="module" defer></script>
  <script src="./js/components/carousel.js" defer></script>
</head>
<body>
  <header id="site-header"></header>

  <div id="carousel" class="carousel">
    <ul class="carousel-wrapper">
      <li class="carousel-item carousel-item-active">
        <img src="assets/images/carousel1.jpg" alt="">
      </li>
      <li class="carousel-item">
        <img src="assets/images/carousel2.jpg" alt="">
      </li>
      <li class="carousel-item">
        <img src="assets/images/carousel3.jpg" alt="">
      </li>
    </ul>

    <div class="carousel-controls">
      <button class="carousel-control carousel-control-left">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="carousel-control carousel-control-right">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
          <path d="M9 6L15 12L9 18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>

    <div class="carousel-dots"></div>
  </div>

  <main class="container">
    <section class="hero">
      <h1>Bienvenido</h1>
      <p>Explora turismo, hoteles y emprendimientos locales.</p>
    </section>

    <div id="app"></div>
  </main>

  <div id="site-footer"></div>
</body>
</html>
